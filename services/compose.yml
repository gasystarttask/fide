services:
  documentdb:
    image: ghcr.io/documentdb/documentdb/documentdb-local:latest
    container_name: docdb
    ports:
      - "10260:10260"
    environment:
      - USERNAME=admin
      - PASSWORD=password
      - SKIP_INIT_DATA=true
      - INIT_DATA_PATH=/init_doc_db.d
    volumes:
      - docdb-data:/docdb-data
      - ./scripts:/init_doc_db.d
  meilisearch:
    image: getmeili/meilisearch:v1.13
    container_name: meilisearch
    ports:
      - "7700:7700"
    environment:
      - MEILI_ENV=development
      - MEILI_MASTER_KEY=${MEILISEARCH_API_KEY:-masterKey}
      - MEILI_NO_ANALYTICS=true
    volumes:
      - meilisearch-data:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 10
  meilisearch-init:
    image: curlimages/curl:8.12.1
    container_name: meilisearch_init
    depends_on:
      meilisearch:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/scripts/init-meilisearch.sh"]
    environment:
      - MEILISEARCH_URL=${MEILISEARCH_URL:-http://meilisearch:7700}
      - MEILISEARCH_API_KEY=${MEILISEARCH_API_KEY:-masterKey}
    volumes:
      - ./scripts:/scripts:ro
  bible-chat-scholar:
    image: ghcr.io/gasystarttask/bible-chat-scholar:main
    container_name: bible_chat_scholar
    depends_on:
      - documentdb
      - meilisearch
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: mongodb://admin:password@host.docker.internal:10260/?directConnection=true&tls=true&tlsAllowInvalidCertificates=true
      MONGODB_DB_NAME: ${MONGODB_DB_NAME:-bible_sg}
      MONGODB_COLLECTION_NAME: ${MONGODB_COLLECTION_NAME:-verses}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434/v1}
      LLM_DEFAULT_PROVIDER: ${LLM_DEFAULT_PROVIDER:-openai}
      LLM_CHAT_PROVIDER: ${LLM_CHAT_PROVIDER:-openai}
      LLM_ROUTER_PROVIDER: ${LLM_ROUTER_PROVIDER:-openai}
      LLM_GROUNDED_ANSWER_PROVIDER: ${LLM_GROUNDED_ANSWER_PROVIDER:-openai}
      LLM_EXTRACTION_PROVIDER: ${LLM_EXTRACTION_PROVIDER:-openai}
      LLM_FALLBACK_ORDER_CHAT: ${LLM_FALLBACK_ORDER_CHAT:-openai,gemini,copilot,ollama}
      LLM_FALLBACK_ORDER_ROUTER: ${LLM_FALLBACK_ORDER_ROUTER:-openai,gemini,copilot,ollama}
      LLM_FALLBACK_ORDER_GROUNDED_ANSWER: ${LLM_FALLBACK_ORDER_GROUNDED_ANSWER:-openai,gemini,copilot,ollama}
      LLM_FALLBACK_ORDER_EXTRACTION: ${LLM_FALLBACK_ORDER_EXTRACTION:-openai,gemini,copilot,ollama}
      LLM_CHAT_MODEL: ${LLM_CHAT_MODEL:-gpt-4o-mini}
      LLM_ROUTER_MODEL: ${LLM_ROUTER_MODEL:-gpt-4o-mini}
      LLM_GROUNDED_ANSWER_MODEL: ${LLM_GROUNDED_ANSWER_MODEL:-gpt-4o-mini}
      LLM_EXTRACTION_MODEL: ${LLM_EXTRACTION_MODEL:-gpt-4o-mini}
      COPILOT_MODEL: ${COPILOT_MODEL:-gpt-4o-mini}
      MEILISEARCH_URL: ${MEILISEARCH_URL:-http://meilisearch:7700}
      MEILISEARCH_API_KEY: ${MEILISEARCH_API_KEY:-masterKey}
volumes:
  docdb-data: {}
  meilisearch-data: {}